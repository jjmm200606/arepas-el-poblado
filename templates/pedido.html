{% extends "base.html" %}

{% block title %}Pedido | Arepas El Poblado{% endblock %}

{% block content %}
<section class="banner-titulo">
  <h1>Finalizar pedido</h1>
</section>

<section class="pedido-wrapper">
  <div class="pedido-grid">
    <section class="formulario-pedido">
      <h2>Datos del cliente</h2>

      <form id="formPedido">
        <div class="grupo-campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" autocomplete="name" required>
        </div>

        <div class="grupo-campo">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono" inputmode="numeric" autocomplete="tel" maxlength="15" required>
        </div>

        <div class="grupo-campo">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion" autocomplete="street-address" required>
        </div>

        <div class="grupo-campo grupo-campo-full">
          <label for="observaciones">Observaciones</label>
          <textarea
            id="observaciones"
            name="observaciones"
            rows="5"
            placeholder="Ejemplo: sin sal, entregar después de las 5 pm"
          ></textarea>
        </div>

        <div class="grupo-campo grupo-campo-full">
          <span class="label-pago">Método de pago</span>
          <input type="hidden" id="metodoPago" name="metodoPago" required>

          <div class="metodos-pago-grid">
            <button type="button" class="metodo-pago-card" data-metodo-pago="Efectivo">
              <span class="metodo-pago-icono metodo-pago-icono-imagen">
                <img src="/static/img/pagos/efectivo-icon.png?v=20260510-2" alt="Pago en efectivo">
              </span>
              <span class="metodo-pago-texto">
                <strong>Efectivo</strong>
                <small>Paga al recibir tu pedido</small>
              </span>
            </button>

            <button type="button" class="metodo-pago-card" data-metodo-pago="Wompi">
              <span class="metodo-pago-icono metodo-pago-icono-logo">
                <img src="/static/img/pagos/wompi-logo.png?v=20260510-2" alt="Wompi">
              </span>
              <span class="metodo-pago-texto">
                <strong>Transferencia por Wompi</strong>
                <small>PSE, Nequi, tarjeta y otros medios</small>
              </span>
            </button>
          </div>
        </div>

        <button type="submit" class="boton boton-full" id="botonFinalizarPedido">Finalizar pedido</button>
      </form>
    </section>

    <section class="resumen-pedido">
      <h2>Resumen del pedido</h2>
      <div id="resumenCarrito"></div>
      <h3 id="totalResumen">Total: $0</h3>
    </section>
  </div>
</section>

<script>
  const inputNombre = document.getElementById("nombre");
  const inputTelefono = document.getElementById("telefono");
  const inputDireccion = document.getElementById("direccion");

  function limpiarNombre(valor) {
    return valor
      .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñÜü\s]/g, "")
      .replace(/\s{2,}/g, " ");
  }

  function limpiarTelefono(valor) {
    return valor.replace(/\D/g, "").slice(0, 15);
  }

  function limpiarDireccion(valor) {
    return valor
      .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñÜü0-9\s#\-,./]/g, "")
      .replace(/\s{2,}/g, " ");
  }

  inputNombre.addEventListener("input", () => {
    inputNombre.value = limpiarNombre(inputNombre.value);
  });

  inputTelefono.addEventListener("input", () => {
    inputTelefono.value = limpiarTelefono(inputTelefono.value);
  });

  inputDireccion.addEventListener("input", () => {
    inputDireccion.value = limpiarDireccion(inputDireccion.value);
  });

  function cargarResumenPedido() {
    const resumen = document.getElementById("resumenCarrito");
    const totalResumen = document.getElementById("totalResumen");
    let carrito = window.cartStore.read();

    if (carrito.length === 0) {
      resumen.innerHTML = `
        <div class="pedido-vacio">
          <p>No hay productos en el carrito.</p>
          <a href="/catalogo" class="boton">Ir al catálogo</a>
        </div>
      `;
      totalResumen.textContent = "Total: $0";
      return;
    }

    let html = "";
    let total = 0;

    carrito.forEach((item) => {
      const subtotal = item.precio * item.cantidad;
      total += subtotal;

      html += `
        <div class="item-resumen">
          <h4>${item.nombre}</h4>
          <p>Cantidad: ${item.cantidad}</p>
          <p>Precio unitario: $${item.precio.toLocaleString("es-CO")}</p>
          <p class="subtotal-resumen">Subtotal: $${subtotal.toLocaleString("es-CO")}</p>
        </div>
      `;
    });

    resumen.innerHTML = html;
    totalResumen.textContent = "Total: $" + total.toLocaleString("es-CO");
  }

  document.getElementById("formPedido").addEventListener("submit", function(event) {
    event.preventDefault();

    let carrito = window.cartStore.read();
    const botonFinalizar = document.getElementById("botonFinalizarPedido");
    const metodoPago = document.getElementById("metodoPago").value;

    if (carrito.length === 0) {
      window.showAppAlert("No puedes finalizar un pedido sin productos en el carrito.", {
        title: "Carrito vacío",
        variant: "warning",
      });
      return;
    }

    if (!metodoPago) {
      window.showAppAlert("Selecciona un método de pago.", {
        title: "Falta información",
        variant: "warning",
      });
      return;
    }

    const nombre = limpiarNombre(document.getElementById("nombre").value).trim();
    const telefono = limpiarTelefono(document.getElementById("telefono").value);
    const direccion = limpiarDireccion(document.getElementById("direccion").value).trim();

    if (nombre.length < 3) {
      window.showAppAlert("Escribe un nombre valido usando solo letras y espacios.", {
        title: "Nombre no valido",
        variant: "warning",
      });
      return;
    }

    if (telefono.length < 7) {
      window.showAppAlert("Escribe un telefono valido de al menos 7 digitos.", {
        title: "Telefono no valido",
        variant: "warning",
      });
      return;
    }

    if (direccion.length < 5) {
      window.showAppAlert("Escribe una direccion valida.", {
        title: "Direccion no valida",
        variant: "warning",
      });
      return;
    }

    // Calcular total
    const total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);

    const pedido = {
      nombre: nombre,
      telefono: telefono,
      direccion: direccion,
      metodoPago: metodoPago,
      observaciones: document.getElementById("observaciones").value,
      productos: carrito,
      total: total,
      cantidad_items: carrito.reduce((sum, item) => sum + item.cantidad, 0)
    };

    botonFinalizar.disabled = true;
    botonFinalizar.textContent = "Procesando pedido...";

    // Enviar pedido al servidor
    fetch("/api/crear-pedido", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(pedido)
    })
    .then(response => response.json())
    .then(data => {
      if (data.exito) {
        window.cartStore.clear();

        if (data.wompi && data.wompi.url) {
          window.location.href = data.wompi.url;
          return;
        }

        window.showAppAlert("Pedido registrado correctamente. Número de pedido: #" + data.id_pedido, {
          title: "Pedido confirmado",
          variant: "success",
        }).then(() => {
          window.location.href = "/";
        });
      } else {
        window.showAppAlert("Error al procesar el pedido: " + data.mensaje, {
          title: "No se pudo crear el pedido",
          variant: "warning",
        });
        botonFinalizar.disabled = false;
        botonFinalizar.textContent = "Finalizar pedido";
      }
    })
    .catch(error => {
      console.error("Error:", error);
      window.showAppAlert("Error al enviar el pedido. Por favor intenta de nuevo.", {
        title: "Error de conexión",
        variant: "warning",
      });
      botonFinalizar.disabled = false;
      botonFinalizar.textContent = "Finalizar pedido";
    });
  });

  document.querySelectorAll(".metodo-pago-card").forEach((card) => {
    card.addEventListener("click", () => {
      document.querySelectorAll(".metodo-pago-card").forEach((item) => {
        item.classList.remove("seleccionado");
      });

      card.classList.add("seleccionado");
      document.getElementById("metodoPago").value = card.dataset.metodoPago;
    });
  });

  cargarResumenPedido();
</script>
{% endblock %}
